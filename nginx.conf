# ============================
# TripAI Nginx 反代配置
# 使用: sudo cp nginx.conf /etc/nginx/sites-available/tripai
#       sudo ln -s /etc/nginx/sites-available/tripai /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# ============================

# 上游定义
upstream backend_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream frontend_streamlit {
    server 127.0.0.1:8501;
}

server {
    listen 80;
    server_name tripai.yourdomain.com;  # ← 替换为你的域名或服务器 IP

    # 日志
    access_log /var/log/nginx/tripai-access.log;
    error_log /var/log/nginx/tripai-error.log;

    # 上传限制
    client_max_body_size 10M;

    # ========== Streamlit 前端 ==========
    location / {
        proxy_pass http://frontend_streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # SSE 长连接
    }

    # Streamlit WebSocket
    location /_stcore/stream {
        proxy_pass http://frontend_streamlit/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ========== FastAPI 后端 (SSE 支持) ==========
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;                    # SSE 必须关闭缓冲
        proxy_read_timeout 86400;               # SSE 长连接
        proxy_set_header Connection "";
    }

    # 健康检查 (直连后端)
    location /health {
        proxy_pass http://backend_api/health;
        proxy_set_header Host $host;
    }
}
